<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters Pool 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a3d0a;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #064e06, #0a6b0a);
            text-align: center;
            padding: 24px 16px 16px;
            border-bottom: 3px solid #ffd700;
        }

        .header h1 {
            font-size: 2rem;
            color: #ffd700;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .header .subtitle {
            color: #c0d8c0;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .prizes {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .prize {
            background: rgba(255,215,0,0.15);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            padding: 8px 16px;
            text-align: center;
        }

        .prize .amount {
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .prize .label {
            color: #c0d8c0;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-bar {
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            text-align: center;
            font-size: 0.8rem;
            color: #8fbc8f;
        }

        .status-bar .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        .status-bar.error .live-dot { background: #f44336; animation: none; }
        .status-bar.loading .live-dot { background: #ff9800; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px;
        }

        .section-title {
            font-size: 1.1rem;
            color: #ffd700;
            margin: 20px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trophy { font-size: 1.2rem; }

        /* Pool Standings Table */
        .standings-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
        }

        .standings-table th {
            background: rgba(0,0,0,0.4);
            padding: 10px 12px;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8fbc8f;
        }

        .standings-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .standings-table tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .standings-table .rank {
            font-weight: bold;
            color: #ffd700;
            width: 32px;
            text-align: center;
        }

        .standings-table .rank.first { font-size: 1.1rem; }

        .standings-table .person-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .standings-table .golfer-scores {
            font-size: 0.85rem;
            color: #b0c8b0;
        }

        .standings-table .golfer-score {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-right: 12px;
        }

        .golfer-status {
            font-size: 0.7rem;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 600;
        }

        .status-active { color: #4caf50; }
        .status-cut { color: #f44336; background: rgba(244,67,54,0.15); }
        .status-wd { color: #ff9800; background: rgba(255,152,0,0.15); }

        .score {
            font-weight: bold;
            font-size: 1.1rem;
            text-align: right;
            min-width: 50px;
        }

        .score.under-par { color: #f44336; }
        .score.over-par { color: #64b5f6; }
        .score.even-par { color: #fff; }

        .score-cell { text-align: right; }

        .team-ineligible {
            font-size: 0.7rem;
            color: #f44336;
            font-style: italic;
        }

        .thru {
            font-size: 0.75rem;
            color: #8fbc8f;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem; }
            .standings-table td, .standings-table th { padding: 8px 6px; }
            .prizes { gap: 12px; }
            .container { padding: 8px; }
            .golfer-score { display: block !important; margin-bottom: 2px; }
        }

        .tab-bar {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin: 16px 0 8px;
        }

        .tab {
            padding: 8px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            cursor: pointer;
            color: #b0c8b0;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .tab.active {
            background: rgba(255,215,0,0.2);
            border-color: #ffd700;
            color: #ffd700;
            font-weight: 600;
        }

        .tab:hover { background: rgba(255,255,255,0.12); }

        .hidden { display: none !important; }

        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
            color: #8fbc8f;
        }

        .loading-spinner .spin {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,215,0,0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            text-align: center;
            padding: 40px 20px;
            color: #f44336;
        }

        .round-info {
            text-align: center;
            margin: 8px 0 4px;
            font-size: 0.85rem;
            color: #8fbc8f;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>THE MASTERS POOL</h1>
        <div class="subtitle">Augusta National &bull; 2026 &bull; $25 Buy-In</div>
        <div class="prizes">
            <div class="prize">
                <div class="amount">$125</div>
                <div class="label">Best Individual Golfer</div>
            </div>
            <div class="prize">
                <div class="amount">$75</div>
                <div class="label">Best Team Score</div>
            </div>
        </div>
    </div>

    <div class="status-bar loading" id="statusBar">
        <span class="live-dot"></span>
        <span id="statusText">Loading leaderboard...</span>
    </div>

    <div class="container">
        <div class="tab-bar">
            <div class="tab active" data-tab="individual" onclick="switchTab('individual')">Best Golfer ($125)</div>
            <div class="tab" data-tab="team" onclick="switchTab('team')">Team Score ($75)</div>
        </div>

        <div id="roundInfo" class="round-info"></div>

        <div id="loading" class="loading-spinner">
            <div class="spin"></div>
            <div>Fetching live scores from Augusta...</div>
        </div>

        <div id="error" class="error-msg hidden"></div>

        <div id="individualView">
            <table class="standings-table" id="individualTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Owner</th>
                        <th>Best Golfer</th>
                        <th>Thru</th>
                        <th class="score-cell">Score</th>
                    </tr>
                </thead>
                <tbody id="individualBody"></tbody>
            </table>
        </div>

        <div id="teamView" class="hidden">
            <table class="standings-table" id="teamTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Owner</th>
                        <th>Golfers</th>
                        <th class="score-cell">Combined</th>
                    </tr>
                </thead>
                <tbody id="teamBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Pool picks
        const POOL = [
            { owner: "Kasey",  picks: ["Scottie Scheffler", "Min Woo Lee"] },
            { owner: "Luke",   picks: ["Bryson DeChambeau", "Brooks Koepka"] },
            { owner: "Conor",  picks: ["Jon Rahm", "Robert MacIntyre"] },
            { owner: "Dobon",  picks: ["Rory McIlroy", "Corey Conners"] },
            { owner: "Brian",  picks: ["Cameron Young", "Matt Fitzpatrick"] },
            { owner: "Tim",    picks: ["Justin Rose", "Patrick Reed"] },
            { owner: "Robbie", picks: ["Xander Schauffele", "Ludvig Åberg"] },
            { owner: "Anton",  picks: ["Tommy Fleetwood", "Collin Morikawa"] },
        ];

        // Name matching - map our names to possible ESPN name variations
        const NAME_ALIASES = {
            "Scottie Scheffler": ["scheffler"],
            "Min Woo Lee": ["min woo lee", "m.w. lee", "mw lee", "minwoo lee"],
            "Bryson DeChambeau": ["dechambeau"],
            "Brooks Koepka": ["koepka"],
            "Jon Rahm": ["rahm"],
            "Robert MacIntyre": ["macintyre", "bob macintyre"],
            "Rory McIlroy": ["mcilroy"],
            "Corey Conners": ["conners"],
            "Cameron Young": ["cam young", "cameron young"],
            "Matt Fitzpatrick": ["fitzpatrick", "matthew fitzpatrick"],
            "Justin Rose": ["rose"],
            "Patrick Reed": ["reed"],
            "Xander Schauffele": ["schauffele"],
            "Ludvig Åberg": ["aberg", "ludvig aberg", "åberg"],
            "Tommy Fleetwood": ["fleetwood"],
            "Collin Morikawa": ["morikawa"],
        };

        let currentTab = 'individual';
        let lastData = null;

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tab);
            });
            document.getElementById('individualView').classList.toggle('hidden', tab !== 'individual');
            document.getElementById('teamView').classList.toggle('hidden', tab !== 'team');
        }

        function matchGolfer(espnName, pickName) {
            const espnLower = espnName.toLowerCase().trim();
            const pickLower = pickName.toLowerCase().trim();

            // Direct match
            if (espnLower === pickLower) return true;
            if (espnLower.includes(pickLower) || pickLower.includes(espnLower)) return true;

            // Check aliases
            const aliases = NAME_ALIASES[pickName] || [];
            for (const alias of aliases) {
                if (espnLower.includes(alias) || alias.includes(espnLower)) return true;
            }

            // Last name match as fallback
            const espnLast = espnLower.split(' ').pop();
            const pickLast = pickLower.split(' ').pop();
            if (espnLast === pickLast && espnLast.length > 3) return true;

            return false;
        }

        function formatScore(score) {
            if (score === 0) return "E";
            if (score > 0) return "+" + score;
            return String(score);
        }

        function scoreClass(score) {
            if (score < 0) return "under-par";
            if (score > 0) return "over-par";
            return "even-par";
        }

        function parseScoreFromText(text) {
            if (!text || text === '-' || text === '') return null;
            if (text === 'E') return 0;
            return parseInt(text, 10);
        }

        async function fetchLeaderboard() {
            // ESPN golf leaderboard API for The Masters
            // Tournament ID for The Masters is typically 401580329 or similar
            // We'll use the general PGA leaderboard endpoint and find The Masters
            const urls = [
                'https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard',
            ];

            for (const url of urls) {
                try {
                    const resp = await fetch(url);
                    if (!resp.ok) continue;
                    const data = await resp.json();

                    // Find The Masters event
                    if (data.events && data.events.length > 0) {
                        let mastersEvent = data.events.find(e =>
                            e.name && (e.name.toLowerCase().includes('masters') ||
                            e.name.toLowerCase().includes('augusta'))
                        );

                        // If no Masters found, use the current/most recent event
                        if (!mastersEvent) {
                            mastersEvent = data.events[0];
                        }

                        return parseESPNEvent(mastersEvent);
                    }
                } catch (e) {
                    console.error('Fetch error:', e);
                }
            }

            throw new Error('Could not fetch leaderboard data');
        }

        function parseESPNEvent(event) {
            const golfers = [];
            const eventName = event.name || 'The Masters';
            let roundInfo = '';

            if (event.status) {
                roundInfo = event.status;
            }

            const competitions = event.competitions || [];
            for (const comp of competitions) {
                const competitors = comp.competitors || [];
                roundInfo = comp.status?.type?.detail || roundInfo;

                for (const c of competitors) {
                    const athlete = c.athlete || {};
                    const name = athlete.displayName || athlete.shortName || '';
                    const score = parseScoreFromText(c.score) ?? (c.linescores ? null : null);
                    const status = c.status?.type?.name || 'active';
                    const position = c.status?.position?.displayName || c.sortOrder || '';
                    const thru = c.status?.thru || c.thru || '';
                    const today = c.linescores ? null : null;

                    // Parse score from the score display value
                    let totalScore = score;
                    if (totalScore === null && c.score !== undefined) {
                        totalScore = parseScoreFromText(String(c.score));
                    }
                    // Also check statistics
                    if (totalScore === null && c.statistics && c.statistics.length > 0) {
                        for (const stat of c.statistics) {
                            if (stat.name === 'scoreToPar') {
                                totalScore = parseScoreFromText(stat.displayValue);
                            }
                        }
                    }

                    // Determine if cut/WD
                    let playerStatus = 'active';
                    if (status === 'cut' || (c.status && c.status.type && c.status.type.id === '3')) {
                        playerStatus = 'CUT';
                    } else if (status === 'wd' || status === 'withdrawn') {
                        playerStatus = 'WD';
                    }

                    // Get thru info
                    let thruDisplay = '';
                    if (c.status && c.status.period) {
                        const round = c.status.period;
                        const thruHoles = c.status.thru;
                        if (thruHoles === 18 || thruHoles === 0) {
                            thruDisplay = `R${round} F`;
                        } else if (thruHoles) {
                            thruDisplay = `R${round} Thru ${thruHoles}`;
                        } else {
                            thruDisplay = `R${round}`;
                        }
                    }

                    if (playerStatus === 'CUT') thruDisplay = 'CUT';
                    if (playerStatus === 'WD') thruDisplay = 'WD';

                    golfers.push({
                        name: name,
                        score: totalScore !== null ? totalScore : 999,
                        status: playerStatus,
                        thru: thruDisplay,
                        position: position,
                        sortOrder: c.sortOrder || 999,
                    });
                }
            }

            return { golfers, eventName, roundInfo };
        }

        function renderStandings(data) {
            const { golfers, eventName, roundInfo } = data;
            lastData = data;

            // Update round info
            const roundEl = document.getElementById('roundInfo');
            roundEl.textContent = `${eventName}${roundInfo ? ' \u2022 ' + roundInfo : ''}`;

            // Match golfers to pool picks
            const poolResults = POOL.map(entry => {
                const matched = entry.picks.map(pick => {
                    const found = golfers.find(g => matchGolfer(g.name, pick));
                    if (found) {
                        return { ...found, pickName: pick };
                    }
                    return { name: pick, pickName: pick, score: 999, status: 'N/A', thru: '-', notFound: true };
                });

                const bestGolfer = matched.reduce((a, b) =>
                    (a.score <= b.score) ? a : b
                );

                const allActive = matched.every(g => g.status === 'active');
                const teamScore = allActive
                    ? matched.reduce((sum, g) => sum + g.score, 0)
                    : null;

                return {
                    owner: entry.owner,
                    golfers: matched,
                    bestGolfer,
                    teamScore,
                    teamEligible: allActive,
                };
            });

            // Sort for individual (best single golfer)
            const individualSorted = [...poolResults].sort((a, b) => a.bestGolfer.score - b.bestGolfer.score);

            // Sort for team (combined score, ineligible at bottom)
            const teamSorted = [...poolResults].sort((a, b) => {
                if (a.teamEligible && !b.teamEligible) return -1;
                if (!a.teamEligible && b.teamEligible) return 1;
                if (a.teamScore === null && b.teamScore === null) return 0;
                if (a.teamScore === null) return 1;
                if (b.teamScore === null) return -1;
                return a.teamScore - b.teamScore;
            });

            // Render individual
            const indBody = document.getElementById('individualBody');
            indBody.innerHTML = individualSorted.map((entry, i) => {
                const g = entry.bestGolfer;
                const scoreText = g.score === 999 ? '-' : formatScore(g.score);
                const sClass = g.score === 999 ? '' : scoreClass(g.score);
                return `<tr>
                    <td class="rank ${i === 0 ? 'first' : ''}">${i + 1}</td>
                    <td class="person-name">${entry.owner}</td>
                    <td>
                        <span>${g.pickName}</span>
                        ${g.status === 'CUT' ? '<span class="golfer-status status-cut">CUT</span>' : ''}
                        ${g.status === 'WD' ? '<span class="golfer-status status-wd">WD</span>' : ''}
                        <div class="golfer-scores">
                            ${entry.golfers.filter(x => x.pickName !== g.pickName).map(x =>
                                `<span class="golfer-score">${x.pickName}: ${x.score === 999 ? '-' : formatScore(x.score)}
                                ${x.status === 'CUT' ? '<span class="golfer-status status-cut">CUT</span>' : ''}
                                ${x.status === 'WD' ? '<span class="golfer-status status-wd">WD</span>' : ''}
                                </span>`
                            ).join('')}
                        </div>
                    </td>
                    <td class="thru">${g.thru || '-'}</td>
                    <td class="score-cell score ${sClass}">${scoreText}</td>
                </tr>`;
            }).join('');

            // Render team
            const teamBody = document.getElementById('teamBody');
            teamBody.innerHTML = teamSorted.map((entry, i) => {
                const scoreText = entry.teamEligible ? formatScore(entry.teamScore) : '-';
                const sClass = entry.teamEligible ? scoreClass(entry.teamScore) : '';
                return `<tr>
                    <td class="rank ${i === 0 && entry.teamEligible ? 'first' : ''}">${entry.teamEligible ? i + 1 : '-'}</td>
                    <td class="person-name">${entry.owner}</td>
                    <td>
                        ${entry.golfers.map(g => `
                            <span class="golfer-score">
                                ${g.pickName}: ${g.score === 999 ? '-' : formatScore(g.score)}
                                ${g.status === 'CUT' ? '<span class="golfer-status status-cut">CUT</span>' : ''}
                                ${g.status === 'WD' ? '<span class="golfer-status status-wd">WD</span>' : ''}
                            </span>
                        `).join('')}
                        ${!entry.teamEligible ? '<div class="team-ineligible">Ineligible (missed cut/WD)</div>' : ''}
                    </td>
                    <td class="score-cell score ${sClass}">${scoreText}</td>
                </tr>`;
            }).join('');
        }

        async function update() {
            const statusBar = document.getElementById('statusBar');
            const statusText = document.getElementById('statusText');
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');

            try {
                const data = await fetchLeaderboard();
                loadingEl.classList.add('hidden');
                errorEl.classList.add('hidden');
                document.getElementById('individualView').classList.toggle('hidden', currentTab !== 'individual');
                document.getElementById('teamView').classList.toggle('hidden', currentTab !== 'team');

                renderStandings(data);

                statusBar.className = 'status-bar';
                const now = new Date();
                statusText.textContent = `Live \u2022 Updated ${now.toLocaleTimeString()} \u2022 Auto-refreshes every 60s`;
            } catch (e) {
                console.error('Update error:', e);
                if (!lastData) {
                    loadingEl.classList.add('hidden');
                    errorEl.classList.remove('hidden');
                    errorEl.innerHTML = `
                        <p>Unable to fetch leaderboard data.</p>
                        <p style="font-size:0.85rem; color:#8fbc8f; margin-top:8px;">
                            The tournament may not have started yet, or ESPN's API may be temporarily unavailable.<br>
                            The page will keep trying every 60 seconds.
                        </p>`;
                }
                statusBar.className = 'status-bar error';
                statusText.textContent = `Connection issue \u2022 Retrying in 60s...`;
            }
        }

        // Initial load
        update();

        // Auto-refresh every 60 seconds
        setInterval(update, 60000);
    </script>
</body>
</html>
